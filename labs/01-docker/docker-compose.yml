version: "3.8"

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: spoved
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ahihi.123
    volumes:
      - pgdata:/var/lib/postgresql
      - ./backend/script.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - spoved
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spoved"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=spoved;Username=postgres;Password=Ahihi.123"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spoved
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8080/api/ping || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - spoved
    restart: unless-stopped

volumes:
  pgdata:

networks:
  spoved:
    driver: bridge
